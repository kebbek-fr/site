<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le cours — Le français avec Keb & Bek</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Patrick+Hand&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --beige:        #F2EDE3;
    --beige-clair:  #FDF8F2;
    --violet:       #7B5EA8;
    --violet-fonce: #5A4080;
    --violet-clair: #EDE6F5;
    --ambre:        #D4A24E;
    --ambre-clair:  #FAEEDA;
    --ambre-fonce:  #854F0B;
    --vert-fonce:   #4A7A36;
    --bleu-fonce:   #7A9BBF;
    --gris:         #8A8480;
    --gris-clair:   #C9C2BC;
    --texte:        #2A2422;
    --blanc:        #ffffff;
  }
  html, body {
    background: var(--beige); color: var(--texte);
    font-family: "Nunito", sans-serif;
    scroll-behavior: smooth;
  }

  /* ════════════════════════════════
     SECTION 1 — ACCUEIL / AUTOCOLLANT
  ════════════════════════════════ */
  #section-accueil {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px; text-align: center; position: relative;
  }

  .titre-cours-wrap { margin-bottom: 28px; position: relative; }

  .titre-cours {
    font-family: "Caveat", cursive; font-weight: 700;
    font-size: clamp(56px, 11vw, 100px); color: var(--violet-fonce); line-height: 1;
    display: inline-block;
    clip-path: inset(0 100% 0 0);
    animation: ecrire 1.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
  }
  @keyframes ecrire { to { clip-path: inset(0 0% 0 0); } }

  .pointe-stylo {
    position: absolute; top: 50%; left: 0; width: 16px; height: 16px;
    transform: translateY(-50%); opacity: 0;
    animation: deplacer-pointe 1.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
  }
  @keyframes deplacer-pointe {
    0% { left: 0%; opacity: 1; } 92% { left: 98%; opacity: 1; } 100% { left: 100%; opacity: 0; }
  }
  .pointe-stylo svg { width: 100%; height: 100%; }

  .soulignement { width: clamp(240px, 55vw, 400px); height: 14px; margin: 2px auto 0; }
  .soulignement path {
    fill: none; stroke: var(--ambre); stroke-width: 3.5; stroke-linecap: round;
    stroke-dasharray: 460; stroke-dashoffset: 460;
    animation: tracer-soulignement 0.7s ease 1.7s forwards;
  }
  @keyframes tracer-soulignement { to { stroke-dashoffset: 0; } }

  /* Autocollant Keb & Bek */
  .autocollant-wrap {
    position: relative;
    width: min(420px, 80vw);
    margin: 18px auto 0;
    opacity: 0;
    animation: apparaitre-autocollant 0.7s ease 2.2s forwards;
  }
  @keyframes apparaitre-autocollant {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .autocollant-img {
    width: 100%; display: block; border-radius: 18px;
    filter: drop-shadow(0 10px 22px rgba(42,36,34,0.18));
    transition: filter 0.2s ease;
  }

  /* Zone cliquable invisible sur la casquette — seulement active si .casquette-visible */
  .zone-casquette {
    position: absolute;
    top: 0%; left: 3%; width: 32%; height: 14%; /* coordonnées ajustées session 40 */
    cursor: pointer;
    display: none;
  }
  .casquette-visible .zone-casquette { display: block; }

  /* Petit indice discret au survol de la casquette */
  .zone-casquette:hover { filter: drop-shadow(0 0 8px rgba(212,162,78,0.5)); }

  .lien-code-titre {
    margin-top: 14px;
    font-family: "Patrick Hand", cursive;
    font-size: 15px;
    color: var(--ambre-fonce);
    background: var(--ambre-clair);
    border: 1.5px dashed rgba(212,162,78,0.5);
    border-radius: 12px;
    padding: 10px 18px;
    display: inline-block;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.4s ease, max-height 0.4s ease, margin-top 0.4s ease;
  }
  .lien-code-titre.visible {
    opacity: 1; max-height: 120px; margin-top: 14px;
  }

  .btn-commencons {
    margin-top: 26px;
    font-family: "Patrick Hand", cursive; font-size: clamp(18px, 2.5vw, 22px);
    padding: 14px 38px; border-radius: 100px; border: none;
    background: var(--violet-fonce); color: var(--blanc); cursor: pointer;
    box-shadow: 0 5px 20px rgba(90,64,128,0.35);
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
    opacity: 0;
    animation: apparaitre-bouton 0.6s ease 2.6s forwards;
  }
  @keyframes apparaitre-bouton { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .btn-commencons:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 26px rgba(90,64,128,0.45); }

  .fleche-bas {
    margin-top: 36px; opacity: 0;
    animation: apparaitre-fleche 0.6s ease 3s forwards, flotter 2.2s ease-in-out 3.6s infinite;
  }
  @keyframes apparaitre-fleche { to { opacity: 0.5; } }
  @keyframes flotter { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }

  /* ════════════════════════════════
     SECTION 2 — CHOIX DE LANGUE
  ════════════════════════════════ */
  #section-langues {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 24px 80px;
  }

  .langues-titre {
    font-family: "Patrick Hand", cursive; font-size: clamp(24px, 4vw, 32px);
    color: var(--violet-fonce); margin-bottom: 8px; text-align: center;
    height: 1.4em; /* hauteur fixe pour éviter le saut de layout */
    display: flex; align-items: center; justify-content: center;
  }

  /* Carrousel de traductions */
  .langues-titre-texte {
    display: inline-block;
    opacity: 1;
    transition: opacity 0.45s ease;
  }
  .langues-titre-texte.fondu-sortie { opacity: 0; }
  .langues-titre-texte.fondu-entree { opacity: 1; }

  /* Flèche RTL pour l'arabe */
  .langues-titre-texte[dir="rtl"] { unicode-bidi: embed; }

  .langues-sous {
    font-size: 14px; color: var(--gris); margin-bottom: 32px; text-align: center;
  }

  .grille-langues {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 14px;
    max-width: 760px;
  }

  .btn-langue {
    font-family: "Nunito", sans-serif; font-weight: 700; font-size: 15px;
    padding: 14px 26px; border-radius: 100px;
    background: var(--beige-clair); border: 2px solid var(--violet);
    color: var(--violet-fonce); text-decoration: none; cursor: pointer;
    transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease, background 0.18s ease;
  }
  .btn-langue:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 6px 18px rgba(123,94,168,0.25);
    background: var(--violet-clair);
  }

  .btn-langue.desactive {
    background: var(--beige); border-color: var(--gris-clair); color: var(--gris-clair);
    cursor: not-allowed; pointer-events: none; opacity: 0.55;
  }

  .langue-native { font-size: 12.5px; opacity: 0.7; margin-left: 4px; }

  .btn-retour {
    position: fixed; top: 18px; left: 18px; z-index: 100;
    display: flex; align-items: center; gap: 7px;
    font-family: "Patrick Hand", cursive; font-size: 15px;
    color: var(--violet-fonce); text-decoration: none;
    background: var(--beige-clair); border: 1.5px solid var(--violet);
    border-radius: 100px; padding: 7px 16px 7px 11px;
    box-shadow: 0 3px 10px rgba(90,64,128,0.15);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .btn-retour:hover { transform: translateX(-3px); box-shadow: 0 5px 16px rgba(90,64,128,0.25); }
</style>
</head>
<body>

<a class="btn-retour" href="https://kebbek-fr.github.io/site/">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
    <path d="M19 12H5M5 12L11 6M5 12L11 18" stroke="var(--violet-fonce)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Accueil
</a>

<!-- ═══════════════════ SECTION 1 — ACCUEIL ═══════════════════ -->
<section id="section-accueil">

  <div class="titre-cours-wrap">
    <span class="titre-cours">Le cours</span>
    <div class="pointe-stylo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 20 L16 8 L19 11 L7 23 Z" fill="#5A4080"/>
        <path d="M16 8 L19 5 L22 8 L19 11 Z" fill="#D4A24E"/>
        <path d="M4 20 L2 22 L5 21 Z" fill="#2A2422"/>
      </svg>
    </div>
    <div class="soulignement">
      <svg viewBox="0 0 460 14" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 8 Q 120 2 230 9 Q 340 15 455 6"/>
      </svg>
    </div>
  </div>

  <div class="autocollant-wrap" id="autocollant-wrap">
    <img class="autocollant-img" id="img-autocollant"
         src="images/keb_bek_commencons.png"
         alt="Keb et Bek vous invitent à commencer le cours">
    <!-- Zone cliquable sur la casquette, activée seulement après clic sur Commençons DANS les 5 premières secondes -->
    <div class="zone-casquette" id="zone-casquette" title="?"></div>
  </div>

  <div class="lien-code-titre" id="lien-code-titre">
    🎩 Tu as remarqué la casquette ? <strong>Code : ta-d3p3ch3</strong> — file dans Le charriot !
  </div>

  <button class="btn-commencons" id="btn-commencons">Commençons</button>

  <div class="fleche-bas">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 4 L12 20 M6 14 L12 20 L18 14" stroke="var(--violet-fonce)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

</section>

<!-- ═══════════════════ SECTION 2 — CHOIX DE LANGUE ═══════════════════ -->
<section id="section-langues">

  <div class="langues-titre">
    <span class="langues-titre-texte" id="langues-titre-texte">Dans quelle langue veux-tu apprendre ?</span>
  </div>
  <div class="langues-sous">Les langues grisées arrivent bientôt — reviens les essayer plus tard !</div>

  <div class="grille-langues">
    <a class="btn-langue" href="menus/en.html">English</a>
    <a class="btn-langue" href="menus/es.html">Español</a>
    <a class="btn-langue" href="menus/pt.html">Português</a>

    <span class="btn-langue desactive">中文</span>
    <span class="btn-langue desactive">Français</span>
    <span class="btn-langue desactive">Deutsch</span>
    <span class="btn-langue desactive">Italiano</span>
    <span class="btn-langue desactive">日本語</span>
    <span class="btn-langue desactive">한국어</span>
    <span class="btn-langue desactive">العربية</span>
    <span class="btn-langue desactive">Русский</span>
  </div>

</section>

<script>
  var minuteurDefilement = null;
  var casquetteActivee = false;
  var fenetreExpiree = false; // devient vrai dès que les 5 secondes s'écoulent SANS clic

  function defilerVersLangues() {
    document.getElementById("section-langues").scrollIntoView({ behavior: "smooth" });
  }

  // Défilement automatique après 5 secondes si aucune réaction — ferme aussi la fenêtre de la casquette
  minuteurDefilement = setTimeout(function () {
    fenetreExpiree = true;
    defilerVersLangues();
  }, 5000);

  document.getElementById("btn-commencons").addEventListener("click", function () {
    // Le bouton reste TOUJOURS actif : il annule le minuteur et défile, peu importe le moment du clic
    clearTimeout(minuteurDefilement);
    defilerVersLangues();

    // Mais la casquette ne peut apparaître que si on a cliqué AVANT l'expiration de la fenêtre de 5s.
    // Si fenetreExpiree est déjà vrai (le défilement automatique a déjà eu lieu), on s'arrête ici.
    if (fenetreExpiree) return;

    // 1 seconde après un clic fait à temps : bascule vers l'image avec casquette
    setTimeout(function () {
      document.getElementById("img-autocollant").src = "images/keb_bek_commencons_casquette.png";
      document.getElementById("autocollant-wrap").classList.add("casquette-visible");
      casquetteActivee = true;
    }, 1000);
  });

  document.getElementById("zone-casquette").addEventListener("click", function (e) {
    e.stopPropagation();
    if (!casquetteActivee) return;
    document.getElementById("lien-code-titre").classList.add("visible");
  });

  /* ── Carrousel du titre "Dans quelle langue…" ── */
  var phrasesTitre = [
    { texte: "Dans quelle langue veux-tu apprendre ?",   dir: "ltr" },
    { texte: "What language do you want to learn in?",   dir: "ltr" },
    { texte: "¿En qué idioma quieres aprender?",         dir: "ltr" },
    { texte: "Em que língua queres aprender?",           dir: "ltr" },
    { texte: "你想用哪种语言来学习？",                       dir: "ltr" },
    { texte: "In welcher Sprache möchtest du lernen?",   dir: "ltr" },
    { texte: "In che lingua vuoi imparare?",             dir: "ltr" },
    { texte: "どの言語で学びたいですか？",                    dir: "ltr" },
    { texte: "어떤 언어로 배우고 싶나요?",                    dir: "ltr" },
    { texte: "بأيّ لغة تريد أن تتعلّم؟",                 dir: "rtl" },
    { texte: "На каком языке ты хочешь учиться?",        dir: "ltr" }
  ];

  var indexPhrase = 0;
  var el = document.getElementById("langues-titre-texte");
  var DUREE_AFFICHAGE = 2800; // ms d'affichage plein
  var DUREE_FONDU    = 450;  // ms de transition (doit correspondre au CSS)

  function afficherProchainePhrase() {
    // Fondu sortie
    el.classList.add("fondu-sortie");

    setTimeout(function () {
      // Changer le texte pendant l'invisibilité
      indexPhrase = (indexPhrase + 1) % phrasesTitre.length;
      el.textContent = phrasesTitre[indexPhrase].texte;
      el.setAttribute("dir", phrasesTitre[indexPhrase].dir);

      // Fondu entrée
      el.classList.remove("fondu-sortie");
    }, DUREE_FONDU);
  }

  // Démarrer le carrousel — première rotation après DUREE_AFFICHAGE
  setInterval(afficherProchainePhrase, DUREE_AFFICHAGE + DUREE_FONDU);
</script>

</body>
</html>
